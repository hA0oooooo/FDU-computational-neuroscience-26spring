experiment_name: brainiac_ukb_sklearn_finetune
dataset: ukb
model: brainiac
trainer: sklearn
feature_source: finetuned
finetune_checkpoint_source: fold_best
mode: finetune
task: joint

processed_dir: dataset/processed_brainiac/UKB
metadata_csv: dataset/processed_brainiac/UKB/metadata.csv
features_dir: dataset/processed_brainiac/UKB/features
brainiac_repo: BrainIAC
checkpoint_path: models/BrainIAC.ckpt
output_dir: outputs

image_size: [96, 96, 96]
batch_size: 1
epochs: 20
lr_head: 0.001
lr_backbone: 0.00001
weight_decay: 0
dropout: 0
num_workers: 2
seed: 42
num_folds: 5
device: cuda
gpu_id: 1

age_standardize: true
age_loss_weight: 1.0
sex_loss_weight: 1.0

sklearn:
  age_model: ridge
  sex_model: logistic_regression
  ridge_alpha: 1.0
  logistic_C: 1.0
  logistic_penalty: l2
  max_iter: 2000
  standardize_features: true
