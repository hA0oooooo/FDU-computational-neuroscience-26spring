experiment_name: brainmvp_adni_dl_finetune
dataset: adni
model: brainmvp
trainer: dl
task: label
mode: finetune
num_classes: 3

processed_dir: dataset/processed_brainmvp/ADNI
metadata_csv: dataset/processed_brainmvp/ADNI/metadata.csv
output_dir: outputs
brainmvp_repo: BrainMVP
checkpoint_path: models/brainmvp_uniformer.pth
brainmvp_input_shape: [96, 96, 64]
in_channels: 1
load_pretrained: true

seed: 42
num_folds: 5
batch_size: 1
epochs: 30
lr_head: 0.0001
lr_backbone: 0.00001
weight_decay: 0.0001
dropout: 0.2
freeze_batchnorm: true
num_workers: 2
device: cuda
