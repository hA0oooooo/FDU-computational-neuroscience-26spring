experiment_name: brainiac_ukb_sklearn_frozen
dataset: ukb
model: brainiac
trainer: sklearn
feature_source: frozen
task: joint

processed_dir: dataset/processed_brainiac/UKB
metadata_csv: dataset/processed_brainiac/UKB/metadata.csv
features_dir: dataset/processed_brainiac/UKB/features
brainiac_repo: BrainIAC
checkpoint_path: models/BrainIAC.ckpt
output_dir: outputs

image_size: [96, 96, 96]
batch_size: 2
num_workers: 2
seed: 42
num_folds: 5
device: cuda
gpu_id: 0

sklearn:
  age_model: ridge
  sex_model: logistic_regression
  ridge_alpha: 1.0
  logistic_C: 1.0
  logistic_penalty: l2
  max_iter: 2000
  standardize_features: true
