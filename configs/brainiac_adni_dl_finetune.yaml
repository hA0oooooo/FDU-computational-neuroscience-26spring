experiment_name: brainiac_adni_dl_finetune
dataset: adni
model: brainiac
trainer: dl
task: label
mode: finetune
num_classes: 3

processed_dir: dataset/processed_brainiac/ADNI
metadata_csv: dataset/processed_brainiac/ADNI/metadata.csv
brainiac_repo: BrainIAC
checkpoint_path: models/BrainIAC.ckpt
output_dir: outputs

image_size: [96, 96, 96]
batch_size: 1
epochs: 50
lr_head: 0.0001
lr_backbone: 0.00001
weight_decay: 0.0001
dropout: 0.2
num_workers: 2
seed: 42
num_folds: 5
device: cuda
gpu_id: 0

data_augment:
  enabled: true
  multiplier: 1
  flip_prob: 0.3
  affine_prob: 0.3
  shift_voxels: 2
  rotate_degrees: 5
  scale_range: [0.95, 1.05]
  contrast_prob: 0.1
  gamma_range: [0.9, 1.1]
