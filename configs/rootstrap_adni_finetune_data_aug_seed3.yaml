experiment_name: rootstrap_adni_finetune_data_aug_seed3
dataset: adni
model: rootstrap
trainer: dl
task: label
mode: finetune
num_classes: 3

processed_dir: dataset/processed_rootstrap/ADNI
metadata_csv: dataset/processed_rootstrap/ADNI/metadata.csv
output_dir: outputs
checkpoint_path: models/Alzheimer-Classifier-Demo/86_acc_model.pth
rootstrap_input_shape: [96, 96, 96]

seed: 42
seeds: [42, 2024, 3407]
num_folds: 5
batch_size: 1
epochs: 50
lr: 0.00005
weight_decay: 1e-5
dropout: 0.1
freeze_batchnorm: true
data_augment:
  enabled: true
  flip_prob: 0.3
  affine_prob: 0.35
  shift_voxels: 3
  rotate_degrees: 5
  scale_range: [0.98, 1.02]
  contrast_prob: 0.1
  gamma_range: [0.9, 1.1]
num_workers: 2
device: cuda
gpu_id: 2
